<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Pink Explore</title>

  <link rel="stylesheet" href="login.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <div class="left">
      <div class="overlay"></div>
      <div class="text">
        <h1>Syifa Galeri</h1>
        <p>
          Jelajahi pegunungan, matahari terbenam,
          dan perjalanan yang tak terlupakan.
        </p>
      </div>
    </div>

    <div class="right">

      <form id="registerForm" class="login-box">

        <h2>Register</h2>

        <div class="input-box">
          <input
            type="text"
            id="username"
            placeholder="Nama Pengguna ..."
            required="required">
        </div>

        <div class="input-box">
          <input
            type="email"
            id="email"
            placeholder="Email ..."
            required="required">
        </div>

        <div class="input-box">
          <input
            type="password"
            id="password"
            placeholder="Password ..."
            required="required">
        </div>

        <p id="message" style="color: #ff4d4d; font-size: 14px; margin-bottom: 15px; font-weight: 500; text-align: center;"></p>

        <button type="submit">
          Daftar
        </button>

        <button
          type="button"
          onclick="location.href='../login/index.html'">
          Login
        </button>

      </form>

    </div>

  </div>

  <script src="../js/register.js" defer></script>

</body>
</html>
