<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Login - Pink Explore</title>

  <!-- CSS -->
  <link rel="stylesheet" href="login.css">

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

</head>

<body>

  <div class="container">

    <!-- LEFT SIDE -->
    <div class="left">

      <div class="overlay"></div>

      <div class="text">

        <h1>Pink Explore</h1>

        <p>
          Explore mountains, sunsets,
          and unforgettable journeys.
        </p>

      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

      <!-- LOGIN FORM -->
      <form id="loginForm" class="login-box">

        <h2>Silahkan Login</h2>

        <!-- USERNAME -->
        <div class="input-box">

          <input
            type="text"
            id="username"
            placeholder="Nama Pengguna ..."
            required="required">

        </div>

        <!-- PASSWORD -->
        <div class="input-box">

          <input
            type="password"
            id="password"
            placeholder="Password ..."
            required="required">

        </div>

        <!-- BUTTON LOGIN -->
        <button type="submit">

          Masuk

        </button>


        <!-- BUTTON REGISTER -->
        <button
          type="button"
          onclick="location.href='../register/index.html'">

          Daftar

        </button>

        <!-- ALERT -->
        <div
          id="alertBox"
          class="alert"
          style="display:none;">

        </div>

      </form>

    </div>

  </div>

  <!-- JS -->
  <script src="../js/login.js"></script>

</body>
</html>
